<style>
  @font-face {
    font-family: 'DSEG7';
    src: url('fonts/DSEG7Classic-Bold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
  }

  :root {
    --bg: #16161e;
    --text: #e8e8f0;
    --muted: rgba(232, 232, 240, 0.55);
    --panel: rgba(255, 255, 255, 0.07);
    --panel-hover: rgba(255, 255, 255, 0.13);
    --accent: #ff6b5e;
    --accent-text: #16161e;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --scale: 1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    transition: background 0.3s, color 0.3s;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---------- Top settings bar ---------- */
  .settings {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 14px;
    justify-content: center;
    align-items: flex-end;
    padding: 14px 16px;
  }

  .setting {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .setting > span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding-left: 2px;
  }

  select, input[type="color"] {
    height: 34px;
    border: none;
    border-radius: 9px;
    background: var(--panel);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 0 8px;
    cursor: pointer;
    transition: background 0.15s;
  }

  select:hover, input[type="color"]:hover { background: var(--panel-hover); }

  select option { background: var(--bg); color: var(--text); }

  input[type="color"] {
    width: 46px;
    padding: 4px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }

  /* ---------- Timer ---------- */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 10px 16px 30px;
  }

  .timer {
    font-size: calc(clamp(64px, 18vw, 170px) * var(--scale));
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    letter-spacing: 0.02em;
    cursor: pointer;
    user-select: none;
    color: var(--accent);
    transition: color 0.3s;
  }

  .timer.done { animation: blink 0.8s ease-in-out 5; }

  /* Ghost "unlit segments" behind the LCD font */
  .timer-zone { position: relative; padding: 36px 0; }
  .timer-wrap { position: relative; }

  /* Subtle +/- nudge buttons around the digits */
  .adj-group {
    position: absolute;
    display: flex;
    gap: 6px;
    transform: translateX(-50%);
  }

  #gMinUp, #gMinDown { left: 25%; }
  #gSecUp, #gSecDown { left: 75%; }
  #gMinUp, #gSecUp { top: 0; }
  #gMinDown, #gSecDown { bottom: 0; }

  .adj {
    min-width: 34px;
    height: 26px;
    padding: 0 8px;
    border-radius: 999px;
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    opacity: 0.35;
    transition: opacity 0.15s, background 0.15s;
  }

  .adj:hover { opacity: 1; background: var(--panel); }

  .ghost {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    color: var(--accent);
    transition: opacity 0.3s;
  }

  body.segment .ghost { opacity: 0.05; }

  @keyframes blink {
    50% { opacity: 0.15; }
  }

  .caption {
    font-size: calc(15px * var(--scale));
    color: var(--muted);
    min-height: 1.4em;
  }

  .controls {
    display: flex;
    gap: 12px;
  }

  button {
    font-family: inherit;
    border: none;
    cursor: pointer;
    color: var(--text);
    background: var(--panel);
    border-radius: 11px;
    transition: background 0.15s, color 0.15s, transform 0.05s;
  }

  button:hover { background: var(--panel-hover); }
  button:active { transform: scale(0.96); }

  .controls button {
    font-size: 16px;
    padding: 11px 30px;
    font-weight: 600;
  }

  .controls .primary {
    background: var(--accent);
    color: var(--accent-text);
  }
  .controls .primary:hover { filter: brightness(1.1); }

  /* ---------- Preset chips ---------- */
  .presets {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .chip-row {
    display: grid;
    gap: 8px;
    width: min(560px, calc(100vw - 32px));
  }

  #durationRow { grid-template-columns: repeat(6, 1fr); }
  #untilRow { grid-template-columns: repeat(4, 1fr); }

  .chip {
    position: relative;
    font-size: 14px;
    font-weight: 600;
    padding: 9px 4px;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
    text-align: center;
  }

  .chip.active {
    background: var(--accent);
    color: var(--accent-text);
  }

  .chip .del {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--muted);
    color: var(--muted);
    font-size: 11px;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .chip:hover .del { display: flex; }

  .row-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: -6px;
  }

  /* ---------- Help ---------- */
  .help-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    font-size: 16px;
    font-weight: 700;
    flex: none;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 10;
  }

  .modal.open { display: flex; }

  .modal-box {
    position: relative;
    background: var(--bg);
    border-radius: 16px;
    max-width: 620px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 28px 30px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  }

  .modal-box h2 { font-size: 20px; margin-bottom: 4px; padding-right: 30px; }
  .modal-box h3 { font-size: 15px; margin: 18px 0 6px; color: var(--accent); }
  .modal-box p, .modal-box li { font-size: 14px; line-height: 1.55; }
  .modal-box ul { padding-left: 20px; margin: 6px 0; }
  .modal-box li { margin: 4px 0; }
  .modal-box code {
    background: var(--panel);
    padding: 1px 6px;
    border-radius: 5px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 13px;
  }

  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 16px;
    line-height: 1;
  }

  @media (max-width: 560px) {
    .settings { gap: 8px 10px; }
    .chip { padding: 8px 4px; font-size: 13px; }
    .chip .del { display: flex; }
    .controls button { padding: 10px 24px; }
    #durationRow { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>

    <div class="adj-group" id="gMinDown">

  <div class="caption" id="caption"></div>
  <div class="controls">

  <div class="presets">

  const BASE_DURATIONS = [5, 10, 15, 20, 25, 30, 40, 45, 60, 90, 120];

  const DEFAULTS = {
    l: null,     // language: null -> browser default, 'en' | 'ru'
    t: 'system', // theme: system | dark | light
    p: null,     // color preset key (null -> custom colors)
    bg: null,    // background override (null -> theme default)
    ac: null,    // accent override
    f: 0,        // font index
    s: 100,      // scale percent
    d: [],       // extra custom durations (minutes)
    m: 25,       // selected duration (minutes)
  };

  let cfg = { ...DEFAULTS };

  function encodeConfig(obj) {
    const json = JSON.stringify(obj);
    return btoa(unescape(encodeURIComponent(json)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  function decodeConfig(str) {
    try {
      const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
      const json = decodeURIComponent(escape(atob(b64)));
      const obj = JSON.parse(json);
      return { ...DEFAULTS, ...obj };
    } catch (e) {
      return { ...DEFAULTS };
    }
  }

  function saveConfig() {
    const url = location.pathname + '?config=' + encodeConfig(cfg);
    history.replaceState(null, '', url);
  }

  function loadConfig() {
    const param = new URLSearchParams(location.search).get('config');
    if (param) cfg = decodeConfig(param);
  }

  /* ---------------- Appearance ---------------- */

  function luminance(hex) {
    const n = parseInt(hex.slice(1), 16);
    const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    return (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  }

  const systemDark = matchMedia('(prefers-color-scheme: dark)');

  function applyAppearance() {
    const mode = cfg.t === 'system' ? (systemDark.matches ? 'dark' : 'light') : cfg.t;
    const theme = THEMES[mode] || THEMES.dark;
    const preset = cfg.p && PRESETS[cfg.p];
    const bg = cfg.bg || (preset ? preset.bg : theme.bg);
    const ac = cfg.ac || (preset ? preset.ac : theme.ac);
    const darkBg = luminance(bg) < 0.5;
    const root = document.documentElement.style;

    root.setProperty('--bg', bg);
    root.setProperty('--accent', ac);
    root.setProperty('--text', darkBg ? '#e8e8f0' : '#26262e');
    root.setProperty('--muted', darkBg ? 'rgba(232,232,240,0.55)' : 'rgba(38,38,46,0.55)');
    root.setProperty('--panel', darkBg ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)');
    root.setProperty('--panel-hover', darkBg ? 'rgba(255,255,255,0.13)' : 'rgba(0,0,0,0.11)');
    root.setProperty('--accent-text', luminance(ac) < 0.5 ? '#f5f5f7' : '#1c1c22');
    root.setProperty('--font', FONTS[cfg.f] || FONTS[0]);
    root.setProperty('--scale', cfg.s / 100);
    document.body.classList.toggle('segment', cfg.f === 8);
    document.querySelector('meta[name="theme-color"]').content = bg;

    document.getElementById('theme').value = cfg.t;
    document.getElementById('preset').value = cfg.p || '';
    document.getElementById('bgColor').value = bg;
    document.getElementById('accentColor').value = ac;
    document.getElementById('font').value = String(cfg.f);
    document.getElementById('scale').value = String(cfg.s);
  }

  systemDark.addEventListener('change', () => {
    if (cfg.t === 'system') applyAppearance();
  });

  /* ---------------- Timer ---------------- */

  const timerEl = document.getElementById('timer');
  const ghostEl = document.getElementById('ghost');
  const captionEl = document.getElementById('caption');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');

  function L() { return STR[cfg.l || autoLang]; }

  let totalSec = 25 * 60;   // full length of current timer
  let remaining = totalSec; // seconds left
  let running = false;
  let endAt = 0;            // timestamp when timer hits zero
  let tickId = null;
  let caption = null;       // {type:'min', n} | {type:'until', hm} | null

  function captionText() {
    if (!caption) return '';
    return caption.type === 'min' ? L().minCaption(caption.n) : L().untilCaption(caption.hm);
  }

  function fmt(sec) {
    sec = Math.max(0, Math.round(sec));
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  function render() {
    timerEl.textContent = fmt(remaining);
    ghostEl.textContent = timerEl.textContent.replace(/\d/g, '8');
    captionEl.textContent = captionText();
    startBtn.textContent = running ? L().pause : L().start;
    const finished = !running && remaining === 0;
    document.title = finished ? L().timeUp
      : running ? fmt(remaining) + ' — Pomodoro'
      : L().docTitle;
  }

  function setTimer(seconds, cap) {
    stop();
    totalSec = seconds;
    remaining = seconds;
    caption = cap;
    timerEl.classList.remove('done');
    render();
  }

  function start() {
    if (remaining <= 0) remaining = totalSec;
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
    running = true;
    endAt = Date.now() + remaining * 1000;
    timerEl.classList.remove('done');
    tickId = setInterval(tick, 200);
    render();
  }

  function stop() {
    running = false;
    if (tickId) { clearInterval(tickId); tickId = null; }
  }

  function pause() {
    remaining = Math.max(0, (endAt - Date.now()) / 1000);
    stop();
    render();
  }

  function tick() {
    remaining = (endAt - Date.now()) / 1000;
    if (remaining <= 0) {
      remaining = 0;
      stop();
      finish();
    }
    render();
  }

  function finish() {
    timerEl.classList.add('done');
    document.title = L().timeUp;
    beep();
    notify();
  }

  function notify() {
    // Notify only when the tab is not in focus — on screen the blink and beep are enough
    if (!('Notification' in window)) return;
    if (Notification.permission !== 'granted') return;
    if (!document.hidden && document.hasFocus()) return;
    try {
      const n = new Notification(L().timeUp, {
        body: L().notifBody(captionText()),
        tag: 'pomodoro-done',
      });
      n.onclick = () => { window.focus(); n.close(); };
    } catch (e) { /* notifications unavailable */ }
  }

  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.25, 0.5].forEach(t => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.001, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.2);
        osc.connect(gain).connect(ctx.destination);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.22);
      });
    } catch (e) { /* audio unavailable */ }
  }

  // Nudge the timer by deltaSec — before start or while running
  function adjust(deltaSec) {
    if (running) {
      endAt += deltaSec * 1000;
      remaining = Math.max(0, (endAt - Date.now()) / 1000);
    } else {
      remaining = Math.max(0, Math.min(999 * 60, Math.round(remaining) + deltaSec));
      totalSec = remaining;
    }
    if (remaining > 0) timerEl.classList.remove('done');
    caption = null;      // duration no longer matches a preset
    highlighted = null;
    render();
    renderDurations();
  }

  document.querySelectorAll('.adj').forEach(btn => {
    btn.addEventListener('click', () => adjust(Number(btn.dataset.d)));
  });

  startBtn.addEventListener('click', () => running ? pause() : start());
  timerEl.addEventListener('click', () => running ? pause() : start());
  document.getElementById('resetBtn').addEventListener('click', () => {
    stop();
    remaining = totalSec;
    timerEl.classList.remove('done');
    render();
  });
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      running ? pause() : start();
    }
  });

  /* ---------------- Duration presets ---------------- */

  const durationRow = document.getElementById('durationRow');
  let highlighted = null; // duration chip currently highlighted

  function selectDuration(min) {
    cfg.m = min;
    highlighted = min;
    saveConfig();
    setTimer(min * 60, { type: 'min', n: min });
    renderDurations();
  }

  function renderDurations() {
    durationRow.innerHTML = '';
    const all = [...BASE_DURATIONS, ...cfg.d].sort((a, b) => a - b);
    for (const min of all) {
      const btn = document.createElement('button');
      btn.className = 'chip' + (min === highlighted ? ' active' : '');
      btn.textContent = min;
      btn.addEventListener('click', () => selectDuration(min));
      if (cfg.d.includes(min)) {
        const del = document.createElement('span');
        del.className = 'del';
        del.textContent = '×';
        del.title = L().removeTitle;
        del.addEventListener('click', e => {
          e.stopPropagation();
          cfg.d = cfg.d.filter(x => x !== min);
          saveConfig();
          renderDurations();
        });
        btn.appendChild(del);
      }
      durationRow.appendChild(btn);
    }
    const add = document.createElement('button');
    add.className = 'chip';
    add.textContent = '+';
    add.title = L().addTitle;
    add.addEventListener('click', () => {
      const val = prompt(L().promptMinutes);
      const min = parseInt(val, 10);
      if (!min || min <= 0 || min > 999) return;
      if (!BASE_DURATIONS.includes(min) && !cfg.d.includes(min)) {
        cfg.d.push(min);
      }
      selectDuration(min);
    });
    durationRow.appendChild(add);
  }

  /* ---------------- "Until time" presets ---------------- */

  const untilRow = document.getElementById('untilRow');

  function selectUntil(quarter) {
    const now = new Date();
    const target = new Date(now);
    target.setMinutes(quarter, 0, 0);
    if (target <= now) target.setHours(target.getHours() + 1);
    const seconds = Math.round((target - now) / 1000);
    const hh = String(target.getHours()).padStart(2, '0');
    const mm = String(target.getMinutes()).padStart(2, '0');
    highlighted = null;
    setTimer(seconds, { type: 'until', hm: hh + ':' + mm });
    renderDurations();
    start();
  }

  for (const q of [0, 15, 30, 45]) {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = 'xx:' + String(q).padStart(2, '0');
    btn.addEventListener('click', () => selectUntil(q));
    untilRow.appendChild(btn);
  }

  /* ---------------- Locale ---------------- */

  function applyLocale() {
    const s = L();
    document.documentElement.lang = cfg.l || autoLang;

    document.getElementById('labelTheme').textContent = s.theme;
    document.getElementById('labelPreset').textContent = s.preset;
    document.getElementById('labelBg').textContent = s.bg;
    document.getElementById('labelAccent').textContent = s.accent;
    document.getElementById('labelFont').textContent = s.font;
    document.getElementById('labelScale').textContent = s.scale;
    document.getElementById('labelLang').textContent = s.language;
    document.getElementById('labelMinutes').textContent = s.minutes;
    document.getElementById('labelUntil').textContent = s.untilTime;

    const themeSel = document.getElementById('theme');
    themeSel.options[0].text = s.themeSystem;
    themeSel.options[1].text = s.themeDark;
    themeSel.options[2].text = s.themeLight;

    const presetSel = document.getElementById('preset');
    for (const opt of presetSel.options) {
      opt.text = opt.value ? s.presets[opt.value] : s.presetCustom;
    }

    const fontSel = document.getElementById('font');
    for (const opt of fontSel.options) {
      opt.text = s.fonts[Number(opt.value)];
    }

    document.getElementById('langSel').value = cfg.l || autoLang;
    document.querySelectorAll('.adj').forEach(btn => {
      const d = Number(btn.dataset.d);
      const isMin = Math.abs(d) >= 60;
      const n = Math.abs(isMin ? d / 60 : d);
      btn.title = (d > 0 ? '+' : '−') + n + ' ' + (isMin ? s.minUnit : s.secUnit);
    });
    document.getElementById('helpBtn').title = s.helpTitle;
    document.getElementById('helpBody').innerHTML = s.helpHtml;
    resetBtn.textContent = s.reset;
    timerEl.title = s.clickHint;

    render();
    renderDurations();
  }

  document.getElementById('langSel').addEventListener('change', e => {
    cfg.l = e.target.value;
    saveConfig();
    applyLocale();
  });

  /* ---------------- Help modal ---------------- */

  const helpModal = document.getElementById('helpModal');
  document.getElementById('helpBtn').addEventListener('click', () => helpModal.classList.add('open'));
  document.getElementById('helpClose').addEventListener('click', () => helpModal.classList.remove('open'));
  helpModal.addEventListener('click', e => {
    if (e.target === helpModal) helpModal.classList.remove('open');
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') helpModal.classList.remove('open');
  });

  /* ---------------- Settings events ---------------- */

  const presetSelect = document.getElementById('preset');
  for (const [key, p] of Object.entries(PRESETS)) {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = p.name;
    presetSelect.appendChild(opt);
  }

  presetSelect.addEventListener('change', e => {
    cfg.p = e.target.value || null;
    cfg.bg = null; // preset colors take over
    cfg.ac = null;
    saveConfig();
    applyAppearance();
  });

  // Manual color edits drop the preset but keep its other color
  function bakePresetColors() {
    const preset = cfg.p && PRESETS[cfg.p];
    if (preset) {
      cfg.bg = cfg.bg || preset.bg;
      cfg.ac = cfg.ac || preset.ac;
      cfg.p = null;
    }
  }

  document.getElementById('theme').addEventListener('change', e => {
    cfg.t = e.target.value;
    cfg.p = null; // reset to theme defaults
    cfg.bg = null;
    cfg.ac = null;
    saveConfig();
    applyAppearance();
  });
  document.getElementById('bgColor').addEventListener('input', e => {
    bakePresetColors();
    cfg.bg = e.target.value;
    saveConfig();
    applyAppearance();
  });
  document.getElementById('accentColor').addEventListener('input', e => {
    bakePresetColors();
    cfg.ac = e.target.value;
    saveConfig();
    applyAppearance();
  });
  document.getElementById('font').addEventListener('change', e => {
    cfg.f = parseInt(e.target.value, 10);
    saveConfig();
    applyAppearance();
  });
  document.getElementById('scale').addEventListener('change', e => {
    cfg.s = parseInt(e.target.value, 10);
    saveConfig();
    applyAppearance();
  });

  /* ---------------- Init ---------------- */

  loadConfig();
  applyAppearance();
  highlighted = cfg.m;
  setTimer(cfg.m * 60, { type: 'min', n: cfg.m });
  applyLocale();
  saveConfig();

  if ('serviceWorker' in navigator) {
    addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => { /* offline mode unavailable */ });
    });
  }
})();
</script>
</body>
</html>
